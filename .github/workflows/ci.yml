name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @freevibes/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: API e2e
        run: pnpm --filter @freevibes/api test:e2e

      - name: Prisma validate
        run: pnpm --filter @freevibes/api exec prisma validate

      - name: Build
        run: pnpm build
