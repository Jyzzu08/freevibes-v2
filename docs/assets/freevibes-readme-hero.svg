<svg width="1440" height="560" viewBox="0 0 1440 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FreeVibes 2.0 README hero</title>
  <desc id="desc">Clean horizontal hero banner for the FreeVibes 2.0 repository.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="1368" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171309"/>
      <stop offset="0.58" stop-color="#0C0C0C"/>
      <stop offset="1" stop-color="#040404"/>
    </linearGradient>
